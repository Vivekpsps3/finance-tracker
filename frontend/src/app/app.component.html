<router-outlet />

<app-confirm-dialog />

<div class="toast-host" aria-live="polite" aria-atomic="true">
  @if (toast) {
    <div
      class="toast"
      [class.success]="toast.kind === 'success'"
      [class.error]="toast.kind === 'error'"
      [class.info]="toast.kind === 'info'"
    >
      <span>{{ toast.message }}</span>
      <div class="toast-actions">
        @if (toast.undo) {
          <ui-button variant="ghost" size="sm" (clicked)="undoToast()">Undo</ui-button>
        }
        <ui-button variant="ghost" size="sm" (clicked)="dismissToast()">Dismiss</ui-button>
      </div>
    </div>
  }
</div>
