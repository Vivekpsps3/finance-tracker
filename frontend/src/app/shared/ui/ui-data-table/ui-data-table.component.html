<div class="ui-data-table" [class.ui-data-table--sticky]="stickyHeader()">
  <table
    class="ui-data-table__table"
    [attr.aria-label]="ariaLabel()"
    [attr.aria-describedby]="caption() ? captionId : null">
    @if (caption()) {
      <caption [attr.id]="captionId" class="ui-data-table__caption">{{ caption() }}</caption>
    }
    <ng-content />
  </table>
</div>
