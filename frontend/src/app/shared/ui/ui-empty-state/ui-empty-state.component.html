<div class="ui-empty" role="status">
  @if (icon()) {
    <div class="ui-empty__icon" aria-hidden="true">
      <ui-icon [name]="icon()!" size="md" />
    </div>
  }
  @if (title()) {
    <p class="ui-empty__title">{{ title() }}</p>
  }
  <p class="ui-empty__message">{{ message() }}</p>
  <div class="ui-empty__action">
    <ng-content />
  </div>
</div>
