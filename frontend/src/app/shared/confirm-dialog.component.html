@if (state(); as s) {
  <div class="confirm-backdrop" role="dialog" aria-modal="true" aria-labelledby="confirm-title" aria-describedby="confirm-message">
    <ui-card #dialogPanel class="confirm-panel" (keydown)="onKeydown($event)">
      <h2 id="confirm-title" class="confirm-title">{{ s.title }}</h2>
      <p id="confirm-message" class="confirm-message">{{ s.message }}</p>
      <div class="confirm-actions">
        <ui-button variant="secondary" (clicked)="close(false)">
          {{ s.cancelLabel || 'Cancel' }}
        </ui-button>
        <ui-button variant="danger" (clicked)="close(true)">
          {{ s.confirmLabel || 'Confirm' }}
        </ui-button>
      </div>
    </ui-card>
  </div>
}
