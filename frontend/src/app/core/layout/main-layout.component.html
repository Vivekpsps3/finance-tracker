<a class="skip-link" href="#main-content">Skip to main content</a>

<nav class="navbar" aria-label="Main navigation">
  <div class="nav-content">
    <a routerLink="/" class="logo" aria-label="Finance home">
      <svg class="logo-mark" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <rect width="32" height="32" rx="8" fill="var(--accent-glow)" stroke="var(--accent)" stroke-width="1"/>
        <path d="M8 22V10M14 22V6M20 22v-6M26 22H6" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="logo-text">Finance</span>
    </a>
    <div class="nav-links">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.exact }"
          class="nav-link"
          [attr.title]="item.label">
          <ui-icon [name]="item.icon" size="sm" />
          <span class="nav-link__label">{{ item.label }}</span>
          <span class="nav-link__short">{{ item.shortLabel }}</span>
        </a>
      }
    </div>
  </div>
</nav>

@if (apiOffline) {
  <div class="api-banner-wrap">
    <ui-card class="api-banner-card" padding="none">
      <div class="api-banner" role="alert">
        <ui-icon name="spark" size="sm" />
        <strong class="api-banner__title">API unreachable</strong>
        <span class="api-banner__detail">Start the backend and dev server, then retry.</span>
        <ui-button variant="secondary" size="sm" (clicked)="refreshApiStatus()">Retry</ui-button>
      </div>
    </ui-card>
  </div>
}

<main id="main-content" class="main-content">
  <router-outlet />
</main>
