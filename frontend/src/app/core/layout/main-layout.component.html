<a class="skip-link" href="#main-content">Skip to main content</a>

<nav class="navbar" aria-label="Main navigation">
  <div class="nav-content">
    <a routerLink="/" class="logo" aria-label="Finance home">
      <span class="logo-icon" aria-hidden="true">◎</span>
      <span>Finance</span>
    </a>
    <div class="nav-links">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.exact }"
          class="nav-link"
        >
          {{ item.label }}
        </a>
      }
    </div>
  </div>
</nav>

@if (apiOffline) {
  <div class="api-banner" role="status">
    API unreachable. Start the backend:
    <code>cd backend && uvicorn main:app --reload --host 127.0.0.1 --port 8000</code>
    and run <code>ng serve</code> with the dev proxy.
  </div>
}

<main id="main-content" class="main-content">
  <router-outlet />
</main>
