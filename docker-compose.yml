# Local-first production-like stack: web serves Angular and proxies /api to FastAPI.
# Usage: docker compose up --build
# Open: http://127.0.0.1:8080
# For a domain, put Caddy/Nginx/Cloudflare Access/Tailscale in front of web.

services:
  api:
    build:
      context: ./backend
    volumes:
      - ./data:/data
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/finance.db}
      API_HOST: 0.0.0.0
      CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:8080,http://localhost:8080}
      DISABLE_OPENAPI: ${DISABLE_OPENAPI:-1}
      ALEMBIC_STRICT: ${ALEMBIC_STRICT:-1}
      RATE_LIMIT_PER_MIN: ${RATE_LIMIT_PER_MIN:-60}
      # Optional for non-proxy exposure only:
      # API_KEY: ${API_KEY}
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    build:
      context: ./frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
